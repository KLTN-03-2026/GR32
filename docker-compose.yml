services:
  backend:
    build: ./backend
    container_name: noname-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - uploads_data:/app/uploads
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5000/health',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 35s

  frontend:
    build: ./frontend
    container_name: noname-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

volumes:
  uploads_data:
