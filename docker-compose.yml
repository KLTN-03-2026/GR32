version: "3.8"

services:
  backend:
    build: ./backend
    container_name: noname-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - uploads_data:/app/uploads
    restart: always

  frontend:
    build: ./frontend
    container_name: noname-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  uploads_data:
